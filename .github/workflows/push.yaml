name: Build

on:
  push:
    branches-ignore:
      - wip

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Tests
        run: make && make test
